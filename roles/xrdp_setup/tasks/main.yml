---
# --- Install xrdp/xorgxrdp from the fleet apt repo (xrdp-fleet project) ------
# The custom build carries RemoteFX + H.264; the pin makes it win over the
# distro package. Hosts on a suite we don't build fall back to stock xrdp.
- name: Determine fleet apt suite for this host
  ansible.builtin.shell: . /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
  register: fleet_suite_cmd
  changed_when: false
  check_mode: false

- name: Set fleet suite fact
  ansible.builtin.set_fact:
    fleet_suite: "{{ fleet_suite_cmd.stdout | trim }}"

- name: Install xrdp from the fleet repo (custom RemoteFX + H.264 build)
  when: fleet_suite in fleet_supported_suites
  block:
    - name: Create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Install fleet repo signing key
      ansible.builtin.copy:
        src: fleet-xrdp.gpg
        dest: /etc/apt/keyrings/fleet-xrdp.gpg
        mode: '0644'

    - name: Add fleet apt source (deb822, per-suite)
      ansible.builtin.template:
        src: fleet-xrdp.sources.j2
        dest: /etc/apt/sources.list.d/fleet-xrdp.sources
        mode: '0644'

    - name: Pin the fleet repo above the distro package
      ansible.builtin.copy:
        src: 90-fleet-xrdp.pref
        dest: /etc/apt/preferences.d/90-fleet-xrdp
        mode: '0644'

    - name: Install xrdp + xorgxrdp from the fleet repo
      ansible.builtin.apt:
        name:
          - xrdp
          - xorgxrdp
        state: latest
        update_cache: true
        install_recommends: false
      notify:
        - restart xrdp
        - restart xrdp-sesman

- name: Fall back to stock xrdp (suite not built by the fleet repo)
  when: fleet_suite not in fleet_supported_suites
  block:
    - name: Warn that the fleet repo has no build for this suite
      ansible.builtin.debug:
        msg: >-
          No fleet xrdp build for suite '{{ fleet_suite }}'; installing distro
          stock xrdp. Add a build target in xrdp-fleet to get the custom build.

    - name: Install distro xrdp + xorgxrdp
      ansible.builtin.apt:
        name:
          - xrdp
          - xorgxrdp
        state: present
        update_cache: true
        cache_valid_time: 86400
        install_recommends: false
      notify:
        - restart xrdp
        - restart xrdp-sesman

- name: Add xrdp user to ssl-cert group
  user:
    name: xrdp
    groups: ssl-cert
    append: yes

- name: Create xrdp configuration directory
  file:
    path: /etc/xrdp
    state: directory
    mode: '0755'

- name: Copy xrdp main configuration
  copy:
    src: xrdp.ini
    dest: /etc/xrdp/xrdp.ini
    backup: yes
    mode: '0644'
  notify: restart xrdp

# Colour depth selects the codec: 16 = lossless RGB bitmap/planar (crisp text,
# no chroma hue, best for terminal+browser), 24 = RemoteFX classic, 32 = GFX
# RemoteFX Progressive. gfx.toml order=["RFX"] keeps H.264 off at 24/32.
- name: Validate xrdp_max_bpp
  ansible.builtin.assert:
    that:
      - (xrdp_max_bpp | int) in [16, 24, 32]
    fail_msg: "xrdp_max_bpp must be 16, 24, or 32 (got '{{ xrdp_max_bpp }}')"
    quiet: true

- name: Set xrdp colour depth / codec path (xrdp_max_bpp)
  ansible.builtin.replace:
    path: /etc/xrdp/xrdp.ini
    regexp: '^max_bpp=.*$'
    replace: "max_bpp={{ xrdp_max_bpp | int }}"
  notify: restart xrdp

- name: Copy xrdp GFX codec configuration (RFX-lean)
  copy:
    src: gfx.toml
    dest: /etc/xrdp/gfx.toml
    backup: yes
    mode: '0644'
  notify: restart xrdp

- name: Copy xrdp session manager configuration
  copy:
    src: sesman.ini
    dest: /etc/xrdp/sesman.ini
    backup: yes
    mode: '0644'
  notify: restart xrdp-sesman

- name: Copy xrdp keyboard configuration
  copy:
    src: xrdp_keyboard.ini
    dest: /etc/xrdp/xrdp_keyboard.ini
    backup: yes
    mode: '0644'
  notify: restart xrdp

# Using xrdp's default SSL cert; not shipping our own.

- name: Copy keyboard mapping files
  copy:
    src: "{{ item }}"
    dest: "/etc/xrdp/{{ item }}"
    mode: '0644'
  loop:
    - km-00000406.ini
    - km-00000407.ini
    - km-00000409.ini
    - km-0000040a.ini
    - km-0000040b.ini
    - km-0000040c.ini
    - km-00000410.ini
    - km-00000411.ini
    - km-00000412.ini
    - km-00000414.ini
    - km-00000415.ini
    - km-00000416.ini
    - km-00000419.ini
    - km-0000041d.ini
    - km-00000807.ini
    - km-00000809.ini
    - km-0000080a.ini
    - km-0000080c.ini
    - km-00000813.ini
    - km-00000816.ini
    - km-0000100c.ini
    - km-00010409.ini
    - km-19360409.ini
  notify: restart xrdp

- name: Copy session startup scripts
  copy:
    src: "{{ item }}"
    dest: "/etc/xrdp/{{ item }}"
    mode: '0755'
  loop:
    - startwm.sh
    - reconnectwm.sh
  notify: restart xrdp-sesman

- name: Create pulse audio configuration directory
  file:
    path: /etc/xrdp/pulse
    state: directory
    mode: '0755'

- name: Copy pulse audio configuration
  copy:
    src: pulse/default.pa
    dest: /etc/xrdp/pulse/default.pa
    mode: '0644'
  notify: restart xrdp-sesman

- name: Enable and start xrdp service
  systemd:
    name: xrdp
    enabled: yes
    state: started

- name: Enable and start xrdp-sesman service
  systemd:
    name: xrdp-sesman
    enabled: yes
    state: started

- name: Check whether ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Configure firewall for xrdp (if ufw is installed)
  community.general.ufw:
    rule: allow
    port: '3389'
    proto: tcp
  when: ufw_check.rc == 0

- name: Done
  debug:
    msg: "xrdp is up on port 3389."
