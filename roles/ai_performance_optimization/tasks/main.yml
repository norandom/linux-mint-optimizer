---
# CPU
- name: Install irqbalance for interrupt distribution
  apt:
    name: irqbalance
    state: present
    update_cache: yes
    cache_valid_time: 86400

- name: Enable and start irqbalance service
  systemd:
    name: irqbalance
    enabled: yes
    state: started

- name: Install cpufrequtils for CPU governor management
  apt:
    name: cpufrequtils
    state: present
    update_cache: yes
    cache_valid_time: 86400

- name: Set CPU governor to ondemand for dynamic scaling
  shell: |
    for cpu in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
      if [ -f "$cpu" ]; then
        echo ondemand > "$cpu"
      fi
    done
  register: cpu_governor_result
  changed_when: false

- name: Configure CPU governor to persist across reboots (set to ondemand for flexibility)
  lineinfile:
    path: /etc/default/cpufrequtils
    line: 'GOVERNOR="ondemand"'
    create: yes
    mode: '0644'
    backup: yes

# Remove a stale tunable left in the sysctl file by older versions of this role.
# kernel.sched_migration_cost_ns needs CONFIG_SCHED_DEBUG and is absent on stock
# Mint/Ubuntu 6.8 kernels. If it lingers in 99-ai-performance.conf, every
# `sysctl -p` reload below fails ("cannot stat .../sched_migration_cost_ns") and
# aborts the whole play. It is no longer managed, so ensure it's gone first.
- name: Drop stale kernel.sched_migration_cost_ns from the AI sysctl file
  ansible.posix.sysctl:
    name: kernel.sched_migration_cost_ns
    sysctl_file: /etc/sysctl.d/99-ai-performance.conf
    state: absent
    reload: false

# Memory + swap
- name: Configure kernel parameters for AI workloads
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-ai-performance.conf
    reload: yes
  loop:
    # vm.*
    - { key: "vm.swappiness", value: "1" }              # avoid swapping
    - { key: "vm.vfs_cache_pressure", value: "50" }     # keep more page cache
    - { key: "vm.dirty_ratio", value: "15" }
    - { key: "vm.dirty_background_ratio", value: "5" }
    - { key: "vm.overcommit_memory", value: "1" }       # allow overcommit
    - { key: "vm.overcommit_ratio", value: "80" }
    # scheduler
    - { key: "kernel.sched_autogroup_enabled", value: "0" }
    # NUMA balancing is wasted work inside a VM
    - { key: "kernel.numa_balancing", value: "0" }
    - { key: "kernel.randomize_va_space", value: "1" }

# I/O scheduler
- name: Find available block devices and their schedulers
  shell: |
    for disk in /sys/block/*/queue/scheduler; do
      if [ -f "$disk" ]; then
        echo "$(basename $(dirname $(dirname $disk))): $(cat $disk)"
      fi
    done
  register: io_scheduler_check
  changed_when: false

- name: Set I/O scheduler to mq-deadline
  shell: |
    for disk in /sys/block/*/queue/scheduler; do
      if [ -f "$disk" ] && grep -q "mq-deadline" "$disk"; then
        echo mq-deadline > "$disk"
      fi
    done
  register: io_scheduler_result
  changed_when: false

# GRUB cmdline lives in the advanced_performance role; this one only sets
# runtime I/O scheduler + THP so they don't fight each other.

# Transparent Huge Pages
- name: Check THP status
  command: cat /sys/kernel/mm/transparent_hugepage/enabled
  register: thp_status
  changed_when: false

- name: Set THP to madvise
  shell: echo madvise > /sys/kernel/mm/transparent_hugepage/enabled
  when: "'[madvise]' not in thp_status.stdout"
  register: thp_result
  changed_when: thp_result.rc == 0

- name: Show what got set
  debug:
    msg:
      - "CPU governor: ondemand"
      - "IRQ balancing: on"
      - "swappiness: 1"
      - "I/O scheduler: mq-deadline"
      - "THP: madvise"
      - "memory overcommit: on"
      - "NUMA balancing: off"
      - "Reboot to pick up the GRUB-side changes."
