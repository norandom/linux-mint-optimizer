---
# Turn off services we don't use on these VMs.
# DNS keeps working because systemd-resolved handles it (not avahi).

- name: Gather installed services
  service_facts:

- name: Stop and disable services we don't need (skip ones not installed)
  systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    # Definitely off
    - bluetooth.service
    - blueman-mechanism.service
    - cups.service
    - cups-browsed.service
    - avahi-daemon.service
    - ModemManager.service
    - power-profiles-daemon.service   # conflicts with tuned
    # Probably safe
    - whoopsie.service
    - apport.service
    - fwupd.service                   # run manually when needed
    - kerneloops.service
    - anacron.service
    - speech-dispatcher.service
  when: item in ansible_facts.services

- name: Gather installed packages
  package_facts:
    manager: apt

- name: Remove evolution packages
  apt:
    name:
      - evolution-data-server
      - evolution-data-server-common
    state: absent
    purge: true
  when: "'evolution-data-server' in ansible_facts.packages"

# Desktop autostarts. file: state: absent is idempotent for missing files,
# so no ignore_errors needed.
- name: Disable desktop autostarts
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/xdg/autostart/blueman.desktop
    - /etc/xdg/autostart/evolution-data-server.desktop
    - /etc/xdg/autostart/at-spi-dbus-bus.desktop

- name: Kill leftover desktop processes
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      pkill -f speech-dispatcher || true
      pkill -f evolution-alarm-notify || true
      pkill -f evolution-source-registry || true
      pkill -f evolution-calendar-factory || true
      pkill -f evolution-addressbook-factory || true
      pkill -f at-spi-bus-launcher || true
      pkill -f blueman-applet || true
    executable: /bin/bash
  changed_when: false

# Sanity check: did we accidentally break DNS?
- name: Test DNS resolution after service optimization
  command: nslookup google.com
  register: dns_test
  changed_when: false
  failed_when: dns_test.rc != 0

- name: Verify systemd-resolved is still running
  systemd:
    name: systemd-resolved.service
    state: started
  register: resolved_check

- name: Show what got disabled
  debug:
    msg:
      - "Off: bluetooth, cups, avahi-daemon, ModemManager, power-profiles-daemon"
      - "Off: whoopsie, apport, fwupd, kerneloops, anacron"
      - "Off: speech-dispatcher, evolution-data-server, blueman-applet, at-spi"
      - "DNS: {{ 'OK' if dns_test.rc == 0 else 'BROKEN' }}"
      - "systemd-resolved: {{ resolved_check.state }}"
      - "Rough savings: ~80-200MB RAM, a few % CPU."
