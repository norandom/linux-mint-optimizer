---
- name: Update grub
  command: update-grub
  when: grub_security_config is changed
  changed_when: true

- name: Sysctl reloaded
  command: sysctl -p /etc/sysctl.d/99-advanced-performance.conf
  changed_when: true

- name: Remount root
  ansible.posix.mount:
    path: /
    state: remounted

- name: Restart docker
  systemd:
    name: docker
    state: restarted
  when: ansible_service_mgr == "systemd"
