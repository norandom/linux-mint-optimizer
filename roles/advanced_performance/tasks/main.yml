- name: Ensure docker group exists
  group:
    name: docker
    state: present

# Network: BBR + TCP Fast Open + bigger buffers
- name: TCP/network sysctls
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-advanced-performance.conf
    reload: yes
  loop:
    - { key: "net.core.rmem_max", value: "134217728" }        # 128MB rx buffer
    - { key: "net.core.wmem_max", value: "134217728" }        # 128MB tx buffer
    - { key: "net.core.netdev_max_backlog", value: "5000" }
    - { key: "net.core.netdev_budget", value: "600" }
    - { key: "net.ipv4.tcp_rmem", value: "4096 87380 134217728" }
    - { key: "net.ipv4.tcp_wmem", value: "4096 65536 134217728" }
    - { key: "net.ipv4.tcp_congestion_control", value: "bbr" }
    - { key: "net.ipv4.tcp_fastopen", value: "3" }
    - { key: "net.ipv4.tcp_low_latency", value: "1" }
    - { key: "net.ipv4.tcp_timestamps", value: "0" }          # off saves a few cycles
    - { key: "net.ipv4.tcp_sack", value: "1" }
    - { key: "net.ipv4.tcp_window_scaling", value: "1" }
    - { key: "net.ipv4.tcp_no_metrics_save", value: "1" }
    - { key: "net.ipv4.tcp_moderate_rcvbuf", value: "1" }

# Filesystem (qcow2-safe)
- name: Look up current root fs mount options
  set_fact:
    root_mount_options: "{{ (ansible_facts.mounts | selectattr('mount', 'equalto', '/') | list | first).options }}"

- name: Add noatime,commit=60 to root fs in fstab
  replace:
    path: /etc/fstab
    regexp: '(\S+\s+/\s+\S+\s+)(\S+)(\s+.*)'
    replace: '\1\2,noatime,commit=60\3'
    backup: yes
  when: "'noatime' not in root_mount_options"
  notify: remount root

- name: Tune mq-deadline for qcow2
  shell: |
    for disk in /sys/block/*/queue; do
      if [ -f "$disk/scheduler" ] && [ -f "$disk/read_ahead_kb" ]; then
        echo 128 > "$disk/read_ahead_kb"          # bigger read-ahead helps qcow2
        echo 1 > "$disk/iosched/fifo_batch"
        echo 250 > "$disk/iosched/read_expire"    # ms
        echo 5000 > "$disk/iosched/write_expire"  # ms - lets writes batch
      fi
    done
  register: io_tuning_result
  changed_when: false

# CPU C-states (governor stays at ondemand)
- name: Check available CPU C-states
  shell: |
    if [ -d /sys/devices/system/cpu/cpu0/cpuidle ]; then
      ls /sys/devices/system/cpu/cpu0/cpuidle/
    else
      echo "no_cpuidle"
    fi
  register: cstate_check
  changed_when: false

- name: Disable C-states deeper than C1
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      for cpu in /sys/devices/system/cpu/cpu*/cpuidle/state*; do
        if [ -f "$cpu/disable" ]; then
          state_name=$(cat "$cpu/name" 2>/dev/null || echo "unknown")
          # anything C2+ adds wakeup latency we don't want
          case "$state_name" in
            C[2-9]|C[1-9][0-9]) echo 1 > "$cpu/disable" ;;
          esac
        fi
      done
    executable: /bin/bash
  when: cstate_check.stdout != "no_cpuidle"
  register: cstate_result
  changed_when: false

# Docker
- name: Write /etc/docker/daemon.json
  copy:
    content: |
      {
        "storage-driver": "overlay2",
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        },
        "default-ulimits": {
          "memlock": {"Name": "memlock", "Soft": -1, "Hard": -1}
        },
        "default-shm-size": "1g"
      }
    dest: /etc/docker/daemon.json
    mode: '0644'
    backup: yes
  notify: restart docker

- name: Show what got set
  debug:
    msg:
      - "CPU mitigations: off"
      - "audit: off"
      - "huge pages: 0"
      - "TCP: BBR, Fast Open on, big buffers"
      - "root fs: noatime, commit=60"
      - "C-states: capped at C1"
      - "Docker daemon.json: written"
      - "Reboot to pick up GRUB cmdline changes."
