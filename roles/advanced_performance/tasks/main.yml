---
# Aggressive tuning for Docker AI workloads inside qcow2 VMs.
# Several knobs here trade security for performance. See the README before deploying.

# BPF / mitigations
- name: BPF + speculative-execution settings
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-advanced-performance.conf
    reload: yes
  loop:
    - { key: "kernel.unprivileged_bpf_disabled", value: "1" }
    - { key: "net.core.bpf_jit_enable", value: "1" }
    - { key: "net.core.bpf_jit_harden", value: "0" }  # off for speed
  notify: sysctl reloaded

- name: Patch GRUB cmdline (mitigations off, mq-deadline, THP madvise, C1 max)
  lineinfile:
    path: /etc/default/grub
    regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
    line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet splash elevator=mq-deadline transparent_hugepage=madvise mitigations=off audit=0 intel_idle.max_cstate=1"'
    backup: yes
  register: grub_security_config
  notify: update grub

# Huge pages
# Currently turned off. Uncomment the block below if a Docker workload needs them.

- name: Disable huge pages (set to 0)
  ansible.posix.sysctl:
    name: vm.nr_hugepages
    value: "0"
    state: present
    sysctl_file: /etc/sysctl.d/99-advanced-performance.conf
    reload: yes

- name: Unmount hugepages filesystem if mounted
  ansible.posix.mount:
    path: /mnt/hugepages
    state: unmounted

- name: Remove hugepages mount point
  file:
    path: /mnt/hugepages
    state: absent
