---
# qemu-guest-agent: lets the host talk to the guest (graceful shutdown, freeze/thaw, etc.)
- name: Install qemu-guest-agent
  apt:
    name: qemu-guest-agent
    state: present
    update_cache: yes
    cache_valid_time: 86400

- name: Enable and start qemu-guest-agent
  systemd:
    name: qemu-guest-agent
    enabled: yes
    state: started

# tuned, with the virtual-guest profile applied below
- name: Install tuned
  apt:
    name: tuned
    state: present
    update_cache: yes
    cache_valid_time: 86400

- name: Enable and start tuned
  systemd:
    name: tuned
    enabled: yes
    state: started

- name: Set tuned profile to virtual-guest
  command: tuned-adm profile virtual-guest
  register: tuned_result
  changed_when: "'Switching to profile' in tuned_result.stdout"

# SSH (root login + password auth on — see README's security notes)
- name: Install OpenSSH server
  apt:
    name: openssh-server
    state: present
    update_cache: yes
    cache_valid_time: 86400

- name: Configure SSH to allow root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin yes'
    backup: yes
  notify: restart sshd

- name: Configure SSH to allow password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
    backup: yes
  notify: restart sshd

- name: Ensure SSH service is enabled and started
  systemd:
    name: ssh
    enabled: yes
    state: started

- name: Check whether ufw is installed
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Configure firewall for SSH (if ufw is installed)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  when: ufw_check.rc == 0

- name: Show what got set
  debug:
    msg:
      - "qemu-guest-agent: running"
      - "tuned profile: virtual-guest"
      - "SSH: root login + password auth on"
